<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海亨贸易 · 产品目录 | HAIHENG TRADING · Catalog</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 48px 20px 32px; text-align: center; position: relative; }
  .header h1 { font-size: 2.4em; font-weight: 700; margin-bottom: 8px; }
  .header .subtitle { font-size: 1.1em; opacity: 0.85; margin-bottom: 4px; }
  .header .stats { display: flex; justify-content: center; gap: 32px; margin-top: 20px; flex-wrap: wrap; }
  .header .stat { text-align: center; }
  .header .stat .num { font-size: 1.8em; font-weight: 700; color: #e94560; }
  .header .stat .label { font-size: 0.8em; opacity: 0.7; letter-spacing: 1px; }
  /* 语言切换 */
  .lang-bar { display: flex; justify-content: center; gap: 6px; margin-top: 24px; }
  .lang-bar button { padding: 6px 18px; border: 1.5px solid rgba(255,255,255,0.35); border-radius: 20px; background: transparent; color: rgba(255,255,255,0.75); cursor: pointer; font-size: 0.85em; font-weight: 500; transition: all 0.2s; }
  .lang-bar button:hover { border-color: rgba(255,255,255,0.7); color: #fff; }
  .lang-bar button.active { background: white; color: #1a1a2e; border-color: white; font-weight: 700; }
  /* Nav */
  .nav { position: sticky; top: 0; z-index: 100; background: white; border-bottom: 1px solid #e0e0e0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 12px 20px; display: flex; gap: 8px; overflow-x: auto; flex-wrap: wrap; justify-content: center; }
  .nav a { text-decoration: none; color: #555; padding: 8px 16px; border-radius: 20px; font-size: 0.9em; font-weight: 500; white-space: nowrap; transition: all 0.2s; cursor: pointer; }
  .nav a:hover, .nav a.active { background: #e94560; color: white; }
  /* Container */
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
  .series { margin-bottom: 40px; }
  .series-title { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 3px solid #e94560; }
  .series-title h2 { font-size: 1.5em; color: #1a1a2e; }
  .series-title .badge { color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.75em; font-weight: 600; }
  .badge.s304 { background: #2d6a4f; } .badge.s201 { background: #e76f51; } .badge.mixed { background: #5a4fcf; }
  .series-desc { color: #777; font-size: 0.85em; margin-bottom: 16px; }
  /* Cards */
  .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .product-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: transform 0.25s, box-shadow 0.25s; cursor: pointer; overflow: hidden; border-left: 4px solid transparent; }
  .product-card.steel-304 { border-left-color: #2d6a4f; } .product-card.steel-201 { border-left-color: #e76f51; }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.12); }
  .product-img { width: 100%; height: 200px; overflow: hidden; background: #f8f8f8; display: flex; align-items: center; justify-content: center; }
  .product-img img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.3s; }
  .product-card:hover .product-img img { transform: scale(1.06); }
  .product-info { padding: 16px; }
  .product-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .product-header .sku { font-size: 0.7em; color: #999; font-family: monospace; }
  .product-header .material-tag { font-size: 0.65em; font-weight: 700; padding: 2px 8px; border-radius: 8px; }
  .material-tag.m304 { background: #d8f3dc; color: #2d6a4f; } .material-tag.m201 { background: #ffddd2; color: #e76f51; }
  .product-name { font-size: 0.95em; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; line-height: 1.4; }
  .product-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; }
  .product-price { font-weight: 700; color: #e94560; font-size: 1.05em; }
  .product-qty { color: #888; font-size: 0.75em; }
  /* Detail panel */
  .detail-panel { position: fixed; top: 0; right: -480px; width: 440px; height: 100vh; background: white; box-shadow: -4px 0 24px rgba(0,0,0,0.15); z-index: 200; transition: right 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; }
  .detail-panel.open { right: 0; }
  .detail-panel .close-btn { position: sticky; top: 16px; float: right; margin-right: 16px; width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(0,0,0,0.6); color: white; font-size: 1.2em; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
  .detail-panel .close-btn:hover { background: rgba(0,0,0,0.85); }
  .detail-img { width: 100%; height: 380px; background: #f8f8f8; display: flex; align-items: center; justify-content: center; }
  .detail-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .detail-body { padding: 24px; }
  .detail-body .sku-large { font-size: 0.8em; color: #999; font-family: monospace; margin-bottom: 4px; }
  .detail-body h3 { font-size: 1.3em; color: #1a1a2e; margin-bottom: 20px; line-height: 1.4; }
  .detail-body .detail-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
  .detail-body .detail-row .label { color: #888; font-size: 0.9em; }
  .detail-body .detail-row .value { font-weight: 600; font-size: 0.95em; }
  .detail-body .detail-row .value.price { color: #e94560; font-size: 1.2em; }
  .detail-body .detail-series { margin-top: 20px; padding: 14px 16px; background: #f8f9fa; border-radius: 8px; font-size: 0.85em; color: #666; line-height: 1.6; }
  .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 190; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  /* Footer */
  .footer { text-align: center; padding: 40px 20px; background: #1a1a2e; color: #666; font-size: 0.85em; }
  .footer a { color: #e94560; }
  .footer p { margin-bottom: 4px; }
  /* WhatsApp floating button */
  .wa-float { position: fixed; bottom: 28px; right: 28px; z-index: 250; width: 56px; height: 56px; border-radius: 50%; background: #25D366; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.6em; cursor: pointer; box-shadow: 0 4px 16px rgba(37,211,102,0.4); transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; }
  .wa-float:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(37,211,102,0.55); }
  .wa-float .tooltip { position: absolute; right: 64px; background: #333; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 0.45em; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .wa-float:hover .tooltip { opacity: 1; }
  /* Responsive */
  @media (max-width: 720px) { .header h1 { font-size: 1.6em; } .header .stats { gap: 16px; } .products { grid-template-columns: 1fr; } .detail-panel { width: 100%; right: -100%; } }
</style>
</head>
<body>

<!-- ========== Header（动态渲染） ========== -->
<div class="header" id="header"></div>

<!-- ========== 导航（动态渲染） ========== -->
<nav class="nav" id="nav"></nav>

<!-- ========== Overlay ========== -->
<div class="overlay" id="overlay" onclick="closeDetail()"></div>

<!-- ========== 详情面板 ========== -->
<div class="detail-panel" id="detailPanel">
  <button class="close-btn" onclick="closeDetail()">✕</button>
  <div class="detail-img"><img id="detailImg" src="" alt=""></div>
  <div class="detail-body">
    <div class="sku-large" id="detailSku"></div>
    <h3 id="detailName"></h3>
    <div class="detail-row"><span class="label" id="lblPrice"></span><span class="value price" id="detailPrice"></span></div>
    <div class="detail-row"><span class="label" id="lblMaterial"></span><span class="value" id="detailMaterial"></span></div>
    <div class="detail-row"><span class="label" id="lblPacking"></span><span class="value" id="detailQty"></span></div>
    <div class="detail-row"><span class="label" id="lblSeries"></span><span class="value" id="detailSeries"></span></div>
    <div class="detail-series" id="detailDesc"></div>
  </div>
</div>

<!-- ========== 产品卡片容器 ========== -->
<div class="container" id="container"></div>

<!-- ========== Footer ========== -->
<div class="footer" id="footer"></div>

<!-- ========== WhatsApp 悬浮按钮 ========== -->
<a class="wa-float" id="waFloat" target="_blank">
  💬
  <span class="tooltip" id="waTooltip"></span>
</a>

<!-- ========== 数据文件 ========== -->
<script src="products.js"></script>

<!-- ========== 多语言引擎 ========== -->
<script src="i18n.js"></script>

<!-- ========== 渲染引擎 ========== -->
<script>
(function() {
  var C = CATALOG;
  var seriesMap = {};
  C.series.forEach(function(s) { seriesMap[s.name] = s; });
  window.__SERIES = seriesMap;
  window.__PRODUCTS = {};
  C.products.forEach(function(p) { window.__PRODUCTS[p.sku] = p; });

  // ⚠️ WhatsApp 号码——改成你的
  var WA_NUMBER = "6285177891483";
  var WA_MSG = encodeURIComponent("Halo, saya tertarik dengan produk stainless steel Anda. Bisa minta katalog dan harga?");

  // ========== 全局渲染（需先定义再用） ==========
  window.renderAll = function() {
    var L = I18N;
    var total = C.products.length;
    var count304 = C.products.filter(function(p) { return p.material === "304"; }).length;
    var count201 = total - count304;

    // -- Header --
    document.getElementById("header").innerHTML =
      '<h1>' + L.t("headerTitle") + '</h1>' +
      '<p class="subtitle">' + C.brand.nameEn + '</p>' +
      '<p class="subtitle">' + L.brandTagline() + '</p>' +
      '<div class="stats">' +
        '<div class="stat"><div class="num">' + total + '</div><div class="label">' + L.t("statSKU") + '</div></div>' +
        '<div class="stat"><div class="num">' + C.series.length + '</div><div class="label">' + L.t("statSeries") + '</div></div>' +
        '<div class="stat"><div class="num">' + count304 + '</div><div class="label">' + L.t("stat304") + '</div></div>' +
        '<div class="stat"><div class="num">' + count201 + '</div><div class="label">' + L.t("stat201") + '</div></div>' +
      '</div>' +
      '<div class="lang-bar">' +
        '<button onclick="I18N.switchTo(\'zh\')" class="' + (L.current==="zh"?"active":"") + '">🇨🇳 ' + L.t("langZh") + '</button>' +
        '<button onclick="I18N.switchTo(\'en\')" class="' + (L.current==="en"?"active":"") + '">🇬🇧 ' + L.t("langEn") + '</button>' +
        '<button onclick="I18N.switchTo(\'id\')" class="' + (L.current==="id"?"active":"") + '">🇮🇩 ' + L.t("langId") + '</button>' +
      '</div>';

    // -- Nav --
    var navHtml = '';
    C.series.forEach(function(s) {
      navHtml += '<a onclick="scrollToSeries(\'' + s.id + '\')">' + s.icon + ' ' + L.seriesName(s) + '</a>';
    });
    document.getElementById("nav").innerHTML = navHtml;

    // -- Container --
    var containerHtml = '';
    C.series.forEach(function(s) {
      var prods = C.products.filter(function(p) { return p.series === s.name; });
      var badgeClass = s.material === "304" ? "s304" : s.material === "201" ? "s201" : "mixed";

      containerHtml +=
        '<section class="series" id="' + s.id + '">' +
          '<div class="series-title">' +
            '<h2>' + s.icon + ' ' + L.seriesName(s) + '</h2>' +
            '<span class="badge ' + badgeClass + '">' + s.badge + '</span>' +
          '</div>' +
          (s.desc || s.desc_en || s.desc_id ? '<p class="series-desc">' + L.seriesDesc(s) + '</p>' : '') +
          '<div class="products">';

      prods.forEach(function(p) {
        var matClass = p.material === "304" ? "steel-304" : "steel-201";
        var matTag = p.material === "304" ? "m304" : "m201";
        var img = "images/" + p.sku + ".jpg";
        containerHtml +=
          '<div class="product-card ' + matClass + '" onclick="openDetail(\'' + p.sku + '\')">' +
            '<div class="product-img"><img src="' + img + '" alt="' + p.sku + '" loading="lazy"></div>' +
            '<div class="product-info">' +
              '<div class="product-header">' +
                '<span class="sku">' + p.sku + '</span>' +
                '<span class="material-tag ' + matTag + '">' + p.material + '</span>' +
              '</div>' +
              '<div class="product-name">' + L.productName(p) + '</div>' +
              '<div class="product-meta">' +
                '<span class="product-price">Rp ' + p.price + '</span>' +
                '<span class="product-qty">' + p.qty + ' ' + L.t("detailPcsUnit") + '</span>' +
              '</div>' +
            '</div>' +
          '</div>';
      });

      containerHtml += '</div></section>';
    });

    document.getElementById("container").innerHTML = containerHtml;

    // -- Footer --
    document.getElementById("footer").innerHTML =
      '<p>' + L.brandFooter() + '</p>' +
      '<p>' + L.brandContact() + '</p>';

    // -- WhatsApp 按钮 --
    document.getElementById("waFloat").href = "https://wa.me/" + WA_NUMBER + "?text=" + WA_MSG;
    document.getElementById("waTooltip").textContent = L.t("contactLabel");

    // -- 详情面板静态标签更新 --
    document.getElementById("lblPrice").textContent = L.t("detailUnitPrice");
    document.getElementById("lblMaterial").textContent = L.t("detailMaterial");
    document.getElementById("lblPacking").textContent = L.t("detailPacking");
    document.getElementById("lblSeries").textContent = L.t("detailSeries");

    // -- 重新监听滚动导航 --
    setTimeout(observeSections, 100);
  };

  // ========== 初始化 ==========
  I18N.init();
  renderAll();

  // ========== 导航高亮 ==========
  var observer;
  function observeSections() {
    if (observer) observer.disconnect();
    observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          document.querySelectorAll(".nav a").forEach(function(a) { a.classList.remove("active"); });
          var link = document.querySelector('.nav a[onclick*="' + entry.target.id + '"]');
          if (link) link.classList.add("active");
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll("section[id]").forEach(function(s) { observer.observe(s); });
  }

})();

// ========== 导航滚动 ==========
window.scrollToSeries = function(id) {
  var el = document.getElementById(id);
  if (!el) return;
  var navH = document.getElementById("nav").offsetHeight;
  var top = el.getBoundingClientRect().top + window.pageYOffset - navH - 12;
  window.scrollTo({ top: top, behavior: "smooth" });
};

// ========== 详情面板 ==========
window.openDetail = function(sku) {
  var p = window.__PRODUCTS[sku];
  var s = window.__SERIES[p.series];
  var L = I18N;
  if (!p) return;
  document.getElementById("detailImg").src = "images/" + sku + ".jpg";
  document.getElementById("detailSku").textContent = sku;
  document.getElementById("detailName").textContent = L.productName(p);
  document.getElementById("detailPrice").textContent = "Rp " + p.price;
  document.getElementById("detailMaterial").textContent = p.material + " " + L.t("detailStainless");
  document.getElementById("detailQty").textContent = p.qty + " " + L.t("detailPcsUnit");
  document.getElementById("detailSeries").textContent = s ? L.seriesName(s) : p.series;
  document.getElementById("detailDesc").textContent = s ? L.seriesDesc(s) : "";
  document.getElementById("detailPanel").classList.add("open");
  document.getElementById("overlay").classList.add("show");
  document.body.style.overflow = "hidden";
};

window.closeDetail = function() {
  document.getElementById("detailPanel").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow = "";
};

document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeDetail(); });
</script>

</body>
</html>
